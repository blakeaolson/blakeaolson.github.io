---
layout: default
---
<div class="docs-section">
    <article class="post">
      <header class="post-header" style="margin-bottom: 40px;">
        <h1 class="post-title" style="margin-bottom: 15px; color: #222; font-weight: 500;">{{ page.title }}</h1>
        <div class="post-meta" style="color: rgba(0, 0, 0, 0.6); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 20px;">
          <span style="font-weight: 600; font-size: 1.5rem;">{{ page.date | date: "%B %d, %Y" }}</span>
          {% if page.tags %}
            <span>
              |
              {% for tag in page.tags %}
                <a style="color: #666; text-decoration: none; font-size: 1.1rem;">{{ tag }}</a>{% unless forloop.last %},{% endunless %}
              {% endfor %}
            </span>
          {% endif %}
        </div>
      </header>

      <div class="post-content" style="line-height: 1.7; font-size: 1.5rem; color: rgba(0, 0, 0, 0.85);">
        {{ content }}
      </div>

      <footer class="post-footer" style="margin-top: 50px; padding-top: 30px; text-align: center;">
        <a href="{{ site.baseurl }}/blog/" style="color: #33C3F0; text-decoration: none; font-weight: 600;">← Back to Blog</a>
      </footer>
    </article>
</div>
